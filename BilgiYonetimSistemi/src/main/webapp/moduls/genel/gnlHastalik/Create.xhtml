<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:coco="jakarta.faces.composite/ui">

<ui:composition>

    <coco:createpage id="GnlHastalikCreateForm"
                     renderedListener="#{gnlHastalikController.selected != null}"
                     widgetVar="GnlHastalikCreateDialog"
                     actionListener="#{gnlHastalikController.saveNew}"
                     listForm="GnlHastalikListForm">

        <p:outputLabel value="#{messages.hastalikLabel}" for="@next"/>
        <p:inputText id="tanim" value="#{gnlHastalikController.selected.tanim}" title="#{messages.hastalikText}" size="50" maxlength="50"/>

    </coco:createpage>

</ui:composition>

</html>
