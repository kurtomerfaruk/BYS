      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:coco="jakarta.faces.composite/ui">

<ui:composition>

    <coco:editpage id="GnlHastalikEditForm"
                   widgetVar="GnlHastalikEditDialog"

                   model="#{gnlHastalikController.selected}">

        <p:outputLabel value="#{messages.hastalikLabel}" for="@next"/>
        <p:inputText id="tanim" value="#{gnlHastalikController.selected.tanim}" title="#{messages.hastalikText}" size="50" maxlength="50"/>


    </coco:editpage>
