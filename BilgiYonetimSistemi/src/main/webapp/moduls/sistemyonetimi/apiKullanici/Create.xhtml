<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:coco="jakarta.faces.composite/ui">

<ui:composition>

    <coco:createpage id="ApiKullaniciCreateForm"
                     renderedListener="#{apiKullaniciController.selected != null}"
                     widgetVar="ApiKullaniciCreateDialog"
                     actionListener="#{apiKullaniciController.save}"
                     listForm="ApiKullaniciListForm">

        <p:outputLabel value="#{messages.tcKimlikNoLabel}" for="@next"/>
        <coco:tcKimlikNoDogumTarihi actionListener="#{apiKullaniciController.getTcKimlik()}"
                                    update=":growl,@(.tcUpdate)"
                                    value="#{apiKullaniciController.selected.gnlKisi.tcKimlikNo}"
                                    dateValue="#{apiKullaniciController.selected.gnlKisi.dogumTarihi}"/>

        <p:outputLabel value="#{messages.adLabel}" for="@next"/>
        <p:inputText id="ad" value="#{apiKullaniciController.selected.gnlKisi.ad}"
                     title="#{messages.adText}"
                     required="true"
                     readonly="#{facesContext.renderResponse}" styleClass="tcUpdate" size="50"/>

        <p:outputLabel value="#{messages.soyadLabel}" for="@next"/>
        <p:inputText id="soyad" value="#{apiKullaniciController.selected.gnlKisi.soyad}"
                     title="#{messages.soyadText}"
                     required="true" readonly="#{facesContext.renderResponse}"
                     styleClass="tcUpdate"/>

        <p:outputLabel value="#{messages.telefonLabel}" for="@next"/>
        <p:inputMask id="telefon" value="#{apiKullaniciController.selected.gnlKisi.telefon}"
                     mask="#{messages.telefonFormat}" required="true" title="#{messages.telefonText}"
                     size="14" styleClass="tcUpdate"/>

        <p:outputLabel value="#{messages.telefonLabel}" for="@next"/>
        <p:inputMask id="telefon2" value="#{apiKullaniciController.selected.gnlKisi.telefon2}"
                     mask="#{messages.telefonFormat}" title="#{messages.telefonText}" size="14"
                     styleClass="tcUpdate"/>

        <p:outputLabel value="#{messages.ipAdresLabel}" for="@next"/>
        <p:inputText value="#{apiKullaniciController.selected.ip}" required="true">
            <p:keyFilter regEx="/[\d\.]/"/>
        </p:inputText>


    </coco:createpage>

</ui:composition>

</html>
