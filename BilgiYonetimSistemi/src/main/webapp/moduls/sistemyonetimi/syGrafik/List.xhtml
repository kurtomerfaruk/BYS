<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="primefaces"
                xmlns:pt="jakarta.faces.passthrough"
                xmlns:coco="jakarta.faces.composite/ui">

    <h:form id="SyGrafikListForm" class="form-height">


        <coco:datatable id="datalist"
                        value="#{syGrafikController.lazyItems}"
                        rowKey="#{item.id}"
                        selection="#{syGrafikController.selected}"
                        filtered="#{syGrafikController.filtered}"
                        rowselect=":SyGrafikListForm:datalist:datalist:createButton,:SyGrafikListForm:datalist:datalist:viewButton,:SyGrafikListForm:datalist:datalist:editButton,:SyGrafikListForm:datalist:datalist:deleteButton,:SyGrafikListForm:SyGrafikDataTableContextMenu"
                        rowDblselect="document.getElementById('SyGrafikListForm:datalist:datalist:editButton').click()"
                        contextMenu=":SyGrafikListForm:datalist:datalist:createButton :SyGrafikListForm:datalist:datalist:viewButton :SyGrafikListForm:datalist:datalist:editButton :SyGrafikListForm:datalist:datalist:deleteButton"
                        selectListener="#{syGrafikController.resetParents}"
                        controller="#{syGrafikController}"
                        header="#{messages.grafikListesi}">

            <p:ajax event="colResize" listener="#{syGrafikController.onResize}"/>


            <f:facet name="paginatorBottomLeft">
                <p:commandButton id="createButton" styleClass="ui-button-primary" icon="pi pi-plus"
                                 pt:data-tooltip="#{messages.buttonEkle}"
                                 actionListener="#{syGrafikController.prepareCreate}"
                                 update=":SyGrafikCreateForm:SyGrafikCreateForm"
                                 oncomplete="PF('SyGrafikCreateDialog').show()" onstart="PF('Loading').show()"
                                 onsuccess="PF('Loading').hide()"
                                 rendered="#{syKullaniciController.hasPermission('sygrafik:ekle')}"/>
                <p:commandButton id="editButton" styleClass="ui-button-success" icon="pi pi-pencil"
                                 pt:data-tooltip="#{messages.buttonGuncelle}"
                                 update=":SyGrafikEditForm:SyGrafikEditForm"
                                 oncomplete="PF('SyGrafikEditDialog').show()"
                                 disabled="#{empty syGrafikController.selected}"
                                 onstart="PF('Loading').show()"
                                 onsuccess="PF('Loading').hide()"
                                 rendered="#{syKullaniciController.hasPermission('sygrafik:guncelle')}"/>
                <p:commandButton id="viewButton" styleClass="ui-button-info" icon="pi pi-search"
                                 pt:data-tooltip="#{messages.buttonDetay}"
                                 update=":SyGrafikViewForm:SyGrafikViewForm"
                                 oncomplete="PF('SyGrafikViewDialog').show()"
                                 disabled="#{empty syGrafikController.selected}" onstart="PF('Loading').show()"
                                 onsuccess="PF('Loading').hide()"/>
                <p:commandButton id="deleteButton" styleClass="ui-button-danger" icon="pi pi-trash"
                                 pt:data-tooltip="#{messages.buttonSil}"
                                 actionListener="#{syGrafikController.delete}"
                                 update=":growl,datalist"
                                 disabled="#{empty syGrafikController.selected}"
                                 rendered="#{syKullaniciController.hasPermission('sygrafik:sil')}">
                    <p:confirm header="#{messages.ConfirmationHeader}" message="#{messages.ConfirmDeleteMessage}"
                               icon="pi pi-warning"/>
                </p:commandButton>
            </f:facet>

        </coco:datatable>

        <p:contextMenu id="SyGrafikDataTableContextMenu" for="datalist:datalist">
            <p:menuitem value="#{messages.buttonEkle}"
                        onclick="document.getElementById('SyGrafikListForm:datalist:datalist:createButton').click();"
                        icon="pi pi-plus" rendered="#{syKullaniciController.hasPermission('sygrafik:ekle')}"/>
            <p:menuitem value="#{messages.buttonGuncelle}"
                        onclick="document.getElementById('SyGrafikListForm:datalist:datalist:editButton').click();"
                        icon="pi pi-pencil" rendered="#{syKullaniciController.hasPermission('sygrafik:guncelle')}"/>
            <p:menuitem value="#{messages.buttonDetay}"
                        onclick="document.getElementById('SyGrafikListForm:datalist:datalist:viewButton').click();"
                        icon="pi pi-search"/>
            <p:menuitem value="#{messages.buttonSil}"
                        onclick="document.getElementById('SyGrafikListForm:datalist:datalist:deleteButton').click();"
                        icon="pi pi-trash" rendered="#{syKullaniciController.hasPermission('sygrafik:sil')}"/>
        </p:contextMenu>


        <ui:include src="/confirmation.xhtml"/>

    </h:form>

</ui:composition>
