<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="primefaces"
                xmlns:pt="jakarta.faces.passthrough"
                xmlns:coco="jakarta.faces.composite/ui">

    <h:form id="IyTalepListForm" styleClass="form-height">

        <p:contextMenu id="IyTalepDataTableContextMenu" for="datalist:datalist">
            <p:menuitem value="#{messages.buttonEkle}"
                        onclick="document.getElementById('IyTalepListForm:datalist:datalist:createButton').click();"
                        icon="pi pi-plus" rendered="#{syKullaniciController.hasPermission('iytalep:ekle')}"/>
            <p:menuitem value="#{messages.buttonGuncelle}"
                        onclick="document.getElementById('IyTalepListForm:datalist:datalist:editButton').click();"
                        icon="pi pi-pencil" rendered="#{syKullaniciController.hasPermission('iytalep:guncelle')}"/>
            <p:menuitem value="#{messages.buttonDetay}"
                        onclick="document.getElementById('IyTalepListForm:datalist:datalist:viewButton').click();"
                        icon="pi pi-search"/>
            <p:menuitem value="#{messages.buttonSil}"
                        onclick="document.getElementById('IyTalepListForm:datalist:datalist:deleteButton').click();"
                        icon="pi pi-trash" rendered="#{syKullaniciController.hasPermission('iytalep:sil')}"/>
        </p:contextMenu>
        <coco:datatable id="datalist"
                        value="#{iyTalepController.lazyItems}"
                        rowKey="#{item.id}"
                        selection="#{iyTalepController.selected}"
                        filtered="#{iyTalepController.filtered}"
                        rowselect=":IyTalepListForm:datalist:datalist:createButton,:IyTalepListForm:datalist:datalist:viewButton,:IyTalepListForm:datalist:datalist:editButton,:IyTalepListForm:datalist:datalist:deleteButton"
                        rowDblselect="document.getElementById('IyTalepListForm:datalist:datalist:editButton').click()"
                        contextMenu=":IyTalepListForm:datalist:datalist:createButton :IyTalepListForm:datalist:datalist:viewButton :IyTalepListForm:datalist:datalist:editButton :IyTalepListForm:datalist:datalist:deleteButton"
                        selectListener="#{iyTalepController.resetParents}"
                        controller="#{iyTalepController}"
                        header="#{messages.talepListesi}">

            <p:ajax event="colResize" listener="#{iyTalepController.onResize}"/>

            <f:facet name="paginatorBottomLeft">
                    <p:commandButton id="createButton" styleClass="ui-button-primary" icon="pi pi-plus"
                                     pt:data-tooltip="#{messages.buttonEkle}"
                                     actionListener="#{iyTalepController.prepareCreate}"
                                     update=":IyTalepCreateForm:IyTalepCreateForm"
                                     oncomplete="PF('IyTalepCreateDialog').show()" onstart="PF('Loading').show()"
                                     onsuccess="PF('Loading').hide()"
                                     rendered="#{syKullaniciController.hasPermission('iytalep:ekle')}"/>
                    <p:commandButton id="editButton" styleClass="ui-button-success" icon="pi pi-pencil"
                                     pt:data-tooltip="#{messages.buttonGuncelle}"
                                     update=":IyTalepEditForm:IyTalepEditForm"
                                     oncomplete="PF('IyTalepEditDialog').show()"
                                     disabled="#{empty iyTalepController.selected}" onstart="PF('Loading').show()"
                                     onsuccess="PF('Loading').hide()"
                                     rendered="#{syKullaniciController.hasPermission('iytalep:guncelle')}"/>
                    <p:commandButton id="viewButton" styleClass="ui-button-info" icon="pi pi-search"
                                     pt:data-tooltip="#{messages.buttonDetay}" update=":IyTalepViewForm:IyTalepViewForm"
                                     oncomplete="PF('IyTalepViewDialog').show()"
                                     disabled="#{empty iyTalepController.selected}" onstart="PF('Loading').show()"
                                     onsuccess="PF('Loading').hide()"/>
                    <p:commandButton id="deleteButton" styleClass="ui-button-danger" icon="pi pi-trash"
                                     pt:data-tooltip="#{messages.buttonSil}"
                                     actionListener="#{iyTalepController.delete}" update=":growl,datalist"
                                     disabled="#{empty iyTalepController.selected}"
                                     rendered="#{syKullaniciController.hasPermission('iytalep:sil')}">
                        <p:confirm header="#{messages.ConfirmationHeader}" message="#{messages.ConfirmDeleteMessage}"
                                   icon="pi pi-warning"/>
                    </p:commandButton>
            </f:facet>

        </coco:datatable>


        <ui:include src="/confirmation.xhtml"/>

    </h:form>

</ui:composition>
